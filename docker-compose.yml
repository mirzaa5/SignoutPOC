version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - bridge
  
  authservice:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - redis
    networks:
      - signout-network

  apigateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    ports:
      -"5000:8080"
    depends_on:
      - authservice
    networks:
      - signout-network
      
networks:
  signout-network:
    driver: bridge